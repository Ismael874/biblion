<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Libro - Biblion</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <a href="index.html" class="nav-logo">Biblion</a>
                <ul class="nav-menu">
                    <li><a href="index.html" class="nav-link">Inicio</a></li>
                    <li><a href="login.html" class="nav-link">Iniciar Sesión</a></li>
                    <li><a href="register.html" class="nav-link">Registrarse</a></li>
                    <li><button id="guest-btn" class="nav-link guest-btn">Entrar como Invitado</button></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <div class="add-book-container">
            <h1>Agregar Nuevo Libro</h1>
            <p class="subtitle">Comparte conocimiento con la comunidad</p>
            
            <!-- Tarea frontend: Implementar formulario para agregar libros y conexión con endpoint /book -->
            <form id="add-book-form" class="add-book-form" enctype="multipart/form-data">
                <div class="form-row">
                    <div class="form-group">
                        <label for="title">Título del Libro *</label>
                        <input type="text" id="title" name="title" required placeholder="Ej: Cien años de soledad">
                    </div>

                    <div class="form-group">
                        <label for="author">Autor *</label>
                        <input type="text" id="author" name="author" required placeholder="Ej: Gabriel García Márquez">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="category">Categoría *</label>
                        <select id="category" name="category" required>
                            <option value="">Selecciona una categoría</option>
                            <option value="novela">Novela</option>
                            <option value="ciencia-ficcion">Ciencia Ficción</option>
                            <option value="fantasia">Fantasía</option>
                            <option value="historia">Historia</option>
                            <option value="biografia">Biografía</option>
                            <option value="tecnologia">Tecnología</option>
                            <option value="filosofia">Filosofía</option>
                            <option value="poesia">Poesía</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="year">Año de Publicación</label>
                        <input type="number" id="year" name="year" min="1000" max="2024" placeholder="Ej: 1967">
                    </div>
                </div>

                <div class="form-group">
                    <label for="description">Descripción *</label>
                    <textarea id="description" name="description" required rows="5" placeholder="Escribe una breve descripción del libro..."></textarea>
                </div>

                <div class="form-group">
                    <label for="pdf">Archivo PDF *</label>
                    <div class="file-input-container">
                        <input type="file" id="pdf" name="pdf" accept=".pdf" required>
                        <small>Formatos aceptados: PDF (máx. 50MB)</small>
                    </div>
                </div>

                <div class="form-group">
                    <label for="cover">Imagen de Portada (opcional)</label>
                    <div class="file-input-container">
                        <input type="file" id="cover" name="cover" accept="image/*">
                        <small>Formatos aceptados: JPG, PNG, GIF (máx. 5MB)</small>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Publicar Libro</button>
                    <button type="reset" class="btn btn-secondary">Limpiar Formulario</button>
                </div>
            </form>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/books.js"></script>
</body>
</html>
